services:
  db:
    image: postgres:15
    container_name: postgres
    env_file:
      - ./.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    image: schedulo:latest
    build:
      context: .
    container_name: schedulo
    env_file:
      - ./.env
    ports:
      - "80:8000"
    depends_on:
      - db

volumes:
  postgres_data:
